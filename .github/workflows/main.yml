name: Daily Oil Alert Bot

on:
  schedule:
    # รันทุกวันเวลา 18:10 น. (เวลาไทย)
    - cron: '10 11 * * *'
  workflow_dispatch: # ปุ่มกดรันเองเพื่อทดสอบ

jobs:
  run-oil-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # สำคัญ: เพื่อให้บอทเซฟราคาลง last_price.json ได้
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oil_bot.py

      - name: Save Price History
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_price.json || exit 0
          git commit -m "Update Price Database" || exit 0
          git push || exit 0
